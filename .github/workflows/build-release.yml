# Build and publish a signed, notarized macOS .dmg release whenever a version tag is pushed.
#
# Trigger:
#   git tag v1.0.0
#   git push --tags
#
# Prerequisites (set in repo Settings → Secrets and variables → Actions):
#   APPLE_CERT           - base64-encoded Developer ID Application .p12 certificate
#   APPLE_CERT_PASSWORD  - password for the .p12
#   APPLE_ID             - Apple ID email address
#   APPLE_ID_PASSWORD    - app-specific password (generated at appleid.apple.com)
#   APPLE_TEAM_ID        - 10-character Apple Developer Team ID
#
#   See docs/signing.md for step-by-step instructions on generating each secret.
#
# The produced .dmg and HTML manual are attached to the GitHub Release automatically.

name: Build macOS Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write  # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Install create-dmg and pandoc
        run: brew install create-dmg pandoc

      - name: Build .app with PyInstaller
        run: pyinstaller build.spec

      - name: Import signing certificate
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERT }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERT" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Prepend the temp keychain to the search list
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

      - name: Sign .app
        run: |
          # Identify the Developer ID certificate imported above
          IDENTITY=$(security find-identity -v -p codesigning \
            "$RUNNER_TEMP/build.keychain" \
            | grep "Developer ID Application" \
            | head -1 \
            | awk '{print $2}')

          codesign \
            --force \
            --deep \
            --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            dist/LV-Gen.app

          # Verify the signature
          codesign --verify --deep --strict dist/LV-Gen.app

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "LV-Gen" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "LV-Gen.app" 150 185 \
            --hide-extension "LV-Gen.app" \
            --app-drop-link 450 185 \
            "LV-Gen-${{ github.ref_name }}.dmg" \
            "dist/LV-Gen.app"

      - name: Notarize .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "LV-Gen-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "LV-Gen-${{ github.ref_name }}.dmg"

      - name: Build HTML manual
        run: |
          pandoc docs/MANUAL.md \
            --standalone \
            --embed-resources \
            --resource-path=docs \
            --metadata title="LV-Gen User Manual" \
            --metadata version="${{ github.ref_name }}" \
            -o "LV-Gen-Manual-${{ github.ref_name }}.html"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LV-Gen-${{ github.ref_name }}.dmg
            LV-Gen-Manual-${{ github.ref_name }}.html
          generate_release_notes: true
